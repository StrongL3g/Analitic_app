name: Build Linux Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    # Среда Bullseye (Debian 11) максимально близка к Astra Linux
    container:
      image: python:3.11-slim-bullseye

    steps:
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends binutils gcc libc6-dev git

    - name: Fix git safe directory
      run: git config --global --add safe.directory '*'

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Если PySide6==6.10.1 снова выдаст ошибку, удали ==6.10.1 в requirements.txt
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Linux Executable
      run: |
        # Собираем файл. В Astra/Linux расширение .exe не нужно
        pyinstaller --onefile --name AnaliticApp-Astra main.py

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: AnaliticApp-Astra-Build
        path: dist/AnaliticApp-Astra