name: Build Linux Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    container:
      # Используем Bullseye (Debian 11) - он стабилен и актуален для Astra
      image: python:3.11-slim-bullseye

    steps:
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          binutils \
          gcc \
          libc6-dev \
          git \
        && rm -rf /var/lib/apt/lists/*

    - name: Fix git safe directory
      run: |
        git config --global --add safe.directory '*'

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Linux Executable
      run: |
        # Убедись, что файл называется main.py
        pyinstaller --onefile --name AnaliticApp-Astra main.py

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: AnaliticApp-Astra-Build
        path: dist/AnaliticApp-Astra
        retention-days: 30