name: Build Linux Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Если здесь упадет на PySide6, значит этой версии реально нет для Linux
        # В таком случае просто убери ==6.10.1 в файле requirements.txt
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Linux Executable
      run: |
        pyinstaller --onefile --name AnaliticApp-Linux main.py

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: AnaliticApp-Linux-Build
        path: dist/AnaliticApp-Linux
        retention-days: 30