name: Build Linux Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest  # Используем быстрый современный сервер

    # Запускаем сборку внутри контейнера со старым GLIBC (совместимость с Astra)
    container:
      image: python:3.11-slim-buster

    steps:
    - name: Install system dependencies
      run: |
        apt-get update
        # Устанавливаем инструменты для компиляции и сборки
        apt-get install -y --no-install-recommends \
          binutils \
          gcc \
          libc6-dev \
          && rm -rf /var/lib/apt/lists/*

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Linux Executable
      run: |
        # ВНИМАНИЕ: Проверь, что твой главный файл называется main.py
        # Если нет — замени main.py на нужное имя ниже
        pyinstaller --onefile --name AnaliticApp-Astra main.py

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: AnaliticApp-Astra-Build
        path: dist/AnaliticApp-Astra
        retention-days: 30