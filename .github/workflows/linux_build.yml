name: Build Linux Application

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    # Используем Bullseye (Debian 11), так как он максимально совместим с Astra Linux
    container:
      image: python:3.11-slim-bullseye

    steps:
    - name: Install system dependencies
      run: |
        apt-get update
        # Устанавливаем зависимости для компиляции, БД и графики
        apt-get install -y --no-install-recommends \
          binutils \
          gcc \
          g++ \
          libc6-dev \
          git \
          unixodbc-dev \
          libpq-dev \
          libgl1-mesa-glx \
          libglib2.0-0 \
          libxrender1 \
          libxext6 \
          libdbus-1-3 \
          libxkbcommon-x11-0 \
        && rm -rf /var/lib/apt/lists/*

    - name: Fix git safe directory
      run: |
        # Исправляем проблему безопасности Git в контейнере
        git config --global --add safe.directory '*'

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Здесь подхватится твой обновленный requirements.txt с комментарием
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Linux Executable
      run: |
        # Собираем в один файл. 
        # Добавь флаг --windowed если хочешь, чтобы не открывался терминал при запуске GUI
        pyinstaller --onefile --name AnaliticApp-Astra main.py

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: AnaliticApp-Astra-Build
        path: dist/AnaliticApp-Astra
        retention-days: 30